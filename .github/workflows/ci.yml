name: CI

on:
  push:
    branches:
      - 'feature/*'
      - develop
  pull_request:
    branches:
      - main
      - develop

jobs:
  smoke-test:
    name: smoke-test
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Setup Node
        uses: actions/setup-node@v3
        with:
          node-version: '18'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint --if-present

      - name: Quick unit tests
        run: npm run test:smoke --if-present

  full-test:
    name: full-test
    runs-on: ubuntu-latest
    needs: smoke-test
    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Setup Node
        uses: actions/setup-node@v3
        with:
          node-version: '18'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Run full test suite
        run: npm test --if-present

  build:
    name: build
    runs-on: ubuntu-latest
    needs: smoke-test
    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Setup Node
        uses: actions/setup-node@v3
        with:
          node-version: '18'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build --if-present

concurrency:
  group: ${{ github.ref }}
  cancel-in-progress: true

