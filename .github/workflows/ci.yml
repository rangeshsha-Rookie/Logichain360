name: CI

on:
  push:
    branches:
      - 'feature/*'
      - develop
  pull_request:
    branches:
      - main
      - develop

jobs:
  smoke-test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v3
        with:
          node-version: 18

      # ---- Blockchain module ----
      - name: Install blockchain dependencies
        run: npm ci --prefix blockchain

      - name: Blockchain lint
        run: npm run lint --prefix blockchain --if-present

      - name: Blockchain smoke tests
        run: npm run test:smoke --prefix blockchain --if-present

  full-test:
    runs-on: ubuntu-latest
    needs: smoke-test

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v3
        with:
          node-version: 18

      - name: Install blockchain dependencies
        run: npm ci --prefix blockchain

      - name: Full test suite
        run: npm test --prefix blockchain --if-present

  build:
    runs-on: ubuntu-latest
    needs: smoke-test

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v3
        with:
          node-version: 18

      - name: Install blockchain dependencies
        run: npm ci --prefix blockchain

      - name: Build
        run: npm run build --prefix blockchain --if-present

concurrency:
  group: ${{ github.ref }}
  cancel-in-progress: true
