name: CI / hybrid workflow with smoke-test

on:
  push:
    branches:
      - main
      - develop
  pull_request:
    branches:
      - main
      - develop

jobs:
  smoke-test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v3
        with:
          node-version: 18

      - name: Install server deps
        working-directory: server
        run: npm ci

      - name: Install blockchain deps
        working-directory: blockchain
        run: npm ci

      - name: Validate packages
        run: npm list --prefix server && npm list --prefix blockchain

  full-test:
    needs: smoke-test
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v3
        with:
          node-version: 18

      - name: Install server deps
        working-directory: server
        run: npm ci

      - name: Install blockchain deps
        working-directory: blockchain
        run: npm ci

      - name: Run server tests
        working-directory: server
        run: npm test --if-present

      - name: Run blockchain tests
        working-directory: blockchain
        run: npm test --if-present

  build:
    needs: full-test
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v3
        with:
          node-version: 18

      - name: Install server deps
        working-directory: server
        run: npm install

      - name: Install blockchain deps
        working-directory: blockchain
        run: npm install
      - name: Build server
        working-directory: server
        run: npm run build --if-present

      - name: Build blockchain
        working-directory: blockchain
        run: npm run build --if-present